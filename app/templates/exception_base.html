<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <meta name="description" content="{% block meta_description %}錯誤頁面{% endblock %}" />
    <meta name="author" content="mfhsieh at github (https://github.com/mfhsieh/technical-analysis)" />
    <meta name="copyright"
        content="mfhsieh at github (https://github.com/mfhsieh/technical-analysis), CC BY-NC-SA 4.0" />

    <title>{% block title %}錯誤頁面{% endblock %}</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .error-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1.5rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            {% block error_icon %}<i class="fas fa-exclamation-circle"></i>{% endblock %}
        </div>

        <header>
            <h1 class="h3 mb-3">{% block header_text %}錯誤頁面{% endblock %}</h1>
        </header>

        <main class="mb-4">
            {% block content %}
            <p class="text-muted">抱歉，網頁似乎出了一點問題。</p>
            {% endblock %}
        </main>

        <div class="d-grid gap-2">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>回到首頁
            </a>
        </div>

        <footer class="text-muted border-top pt-3">
            <small>
                &copy; mfhsieh at github &bull; CC BY-NC-SA 4.0
            </small>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
